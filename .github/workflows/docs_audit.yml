name: 📚 Documentation Audit

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'target/manifest.json'
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    name: Run Documentation Gap Finder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Documentation Gap Finder
        run: |
          python gap_finder/gap_finder.py \
            --manifest target/manifest.json \
            --output gap_finder/DOCS_AUDIT.md

      - name: Commit updated DOCS_AUDIT.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 Auto-update DOCS_AUDIT.md [skip ci]"
          file_pattern: gap_finder/DOCS_AUDIT.md
          commit_user_name: "Agentic dbt Librarian"
          commit_user_email: "dbt-librarian[bot]@users.noreply.github.com"

      - name: Parse audit results
        id: parse
        run: |
          CRITICAL=$(grep -oP '🔴 CRITICAL \| \K\d+' gap_finder/DOCS_AUDIT.md || echo 0)
          HIGH=$(grep -oP '🟠 HIGH \| \K\d+' gap_finder/DOCS_AUDIT.md || echo 0)
          TOTAL=$(grep -oP 'Total Models Scanned \| \*\*\K\d+' gap_finder/DOCS_AUDIT.md || echo 0)
          COVERAGE=$(grep -oP 'Overall Documentation Coverage \| \*\*\K[\d.]+' gap_finder/DOCS_AUDIT.md || echo 0)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Open GitHub Issue for CRITICAL gaps
        if: steps.parse.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.parse.outputs.critical }}';
            const coverage = '${{ steps.parse.outputs.coverage }}';
            const total = '${{ steps.parse.outputs.total }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const auditUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/gap_finder/DOCS_AUDIT.md`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['docs-debt', 'critical'],
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Documentation Alert: ${critical} CRITICAL model(s) undocumented`,
                body: [
                  '## 📚 Documentation Gap Alert',
                  '',
                  `The **Agentic dbt Librarian** has detected **${critical} CRITICAL** gaps in your dbt documentation.`,
                  '',
                  `| Metric | Value |`,
                  `|--------|-------|`,
                  `| 🔴 CRITICAL gaps | **${critical}** |`,
                  `| 📊 Overall coverage | **${coverage}%** |`,
                  `| 📦 Total models | **${total}** |`,
                  '',
                  `📄 [View Full Audit Report](${auditUrl})  `,
                  `🔗 [CI Run](${runUrl})`,
                  '',
                  '### Quick Fix',
                  'Commit any `.sql` model file and the n8n Librarian Agent will automatically generate a schema.yml PR for it.',
                  '',
                  '*Generated automatically by [Agentic dbt Librarian](https://github.com/utxarshh/agentic-dbt-librarian)*'
                ].join('\n'),
                labels: ['docs-debt', 'critical', 'automated']
              });
            }
