        description: ""
      - name: coupon_amount
        description: ""
      - name: credit_card_amount
        description: ""
      - name: gift_card_amount
        description: ""
      - name: status
        description: ""
      - name: ordered_at
        description: ""
      - name: is_returned
        description: ""
      - name: net_revenue
        description: ""
